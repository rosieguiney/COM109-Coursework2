<!DOCTYPE html>
<html>
<head>
	<title> Navigation button WIP </title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="navbutton.css">

</head>
<body>
	<button onclick="topFunction()" id="navBtn" title="Navigation button">Back to top</button>

	<div style="background-color: #ffe7fd; min-height: 2500px; padding: 30px;">
		<h1> <strong>  Current navigation button </strong> </h1>
	</div>



<script>
	window.onscroll = function() {scrollFunction()};

	/*When the user scrolls down 300px from the top of the document, show the button */

	function scrollFunction() {
		let navbutton = document.getElementById("navBtn");
		if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
			navbutton.style.display = "block";
		} else {
			navbutton.style.display = "none";
		}
	}

/*When the user clicks on the button, scroll to the top of the document*/
  function topFunction() {
  	window.scrollTo({top: 0, behavior: 'smooth'});
  } 

</script>

</body>
</html>
